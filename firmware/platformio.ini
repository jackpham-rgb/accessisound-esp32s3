; AccessiSound — PlatformIO Project Configuration
; Board: ESP32-S3-DevKitC-1
; Framework: Arduino

[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Serial monitor
monitor_speed = 115200

; Build flags
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -O2

; Libraries
lib_deps =
    ; TFLite Micro for ESP32
    https://github.com/tanakamasayuki/TensorFlowLite_ESP32.git
    ; ESP-DSP (optional — faster FFT than our pure-C fallback)
    idf-component-manager

; Partition scheme with extra OTA/model space
board_build.partitions = huge_app.csv

; Upload speed
upload_speed = 921600
